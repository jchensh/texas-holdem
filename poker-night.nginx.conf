# =========================================================================
# Poker Night Nginx 高性能反向代理与 WebSocket 升级配置模板
# =========================================================================
# 路径推荐: 在 Ubuntu/Debian 上置于 /etc/nginx/sites-available/poker-night
# 并软链接至 /etc/nginx/sites-enabled/ 目录中
# =========================================================================

# 后端 Node 服务集群定义（指向本地 PM2 实例监听的 3000 端口）
upstream poker_backend {
    server 127.0.0.1:3000;
    keepalive 32; # 保持与后端的长连接池，降低握手开销
}

# -------------------------------------------------------------------------
# 默认配置：关闭直接公网 IP 访问（防扫描、防越权、防证书泄漏）
# -------------------------------------------------------------------------
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # 444 代表立刻关闭 TCP 连接，不发送任何响应数据，隐藏服务存在
    return 444;
}

server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    server_name _;

    # 若 Nginx >= 1.19.4，直接拒绝 SSL 握手，使攻击者无法通过 IP 获取证书中绑定的域名
    ssl_reject_handshake on;

    # 兼容低版本 Nginx 兜底，需提供任意 SSL 证书
    ssl_certificate /etc/ssl/certs/ssl-cert-snakeoil.pem;
    ssl_certificate_key /etc/ssl/private/ssl-cert-snakeoil.key;
}

# -------------------------------------------------------------------------
# 模式 A: 有域名且启用 Let's Encrypt SSL 证书 (强烈推荐)
# -------------------------------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name poker.yourdomain.com; # 替换为您的真实主域名

    # 强转所有 HTTP 请求至安全加密的 HTTPS 端口
    location / {
        return 301 https://$host$request_uri;
    }

    # 用于 Certbot (Let's Encrypt) 自动完成域名归属验证
    location ~ /.well-known/acme-challenge {
        allow all;
        root /var/www/html;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name poker.yourdomain.com; # 替换为您的真实主域名

    # SSL 证书文件配置 (部署时 Certbot 命令行会自动追加并修改此处)
    # ssl_certificate /etc/letsencrypt/live/poker.yourdomain.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/poker.yourdomain.com/privkey.pem;

    # 推荐的现代 SSL 参数（Mozilla intermediate 配置，兼顾安全与兼容性）
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # 开启 Gzip 静态文本压缩，极大提升前端原生静态资源（JS/CSS）的加载速率
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1000;
    gzip_comp_level 5;
    gzip_vary on;

    # 严格禁止在主游戏域名下访问管理后台网页及敏感接口
    location = /admin {
        return 403;
    }
    
    location /api/admin/ {
        return 403;
    }

    # 主路由反向代理
    location / {
        proxy_pass http://poker_backend;

        # 传递真实客户端网络信息，以备后端审计日志使用
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 缓冲区调优
        proxy_buffering off; # 实时扑克游戏关闭缓冲，保障即时交付
        client_max_body_size 10M;
    }

    # =====================================================================
    # 核心 Socket.IO 支持 (WebSocket 协议升级)
    # =====================================================================
    location /socket.io/ {
        proxy_pass http://poker_backend;
        
        # 协议升级基础配置
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # 传递客户端真实网络信息
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 扑克实时通信长超时防断连配置 (防止 Nginx 对空闲状态的连接发起强制阻断)
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}

# -------------------------------------------------------------------------
# 新增: 管理后台域名配置 (pokeradmin.yourdomain.com)
# -------------------------------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name pokeradmin.yourdomain.com; # 替换为您的真实管理域名

    # 强转所有 HTTP 请求至安全加密的 HTTPS 端口
    location / {
        return 301 https://$host$request_uri;
    }

    # 用于 Certbot (Let's Encrypt) 自动完成域名归属验证
    location ~ /.well-known/acme-challenge {
        allow all;
        root /var/www/html;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name pokeradmin.yourdomain.com; # 替换为您的真实管理域名

    # SSL 证书文件配置 (部署时 Certbot 命令行会自动追加并修改此处)
    # ssl_certificate /etc/letsencrypt/live/pokeradmin.yourdomain.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/pokeradmin.yourdomain.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1000;
    gzip_comp_level 5;
    gzip_vary on;

    # 根路径隐式代理至后端的 /admin 页面
    location = / {
        proxy_pass http://poker_backend/admin;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_buffering off;
    }

    # 允许管理后台加载静态资源（如样式、图片、公用 JS）
    location / {
        proxy_pass http://poker_backend;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;
    }

    # 管理后台 Socket.IO 通信与实时控制台日志传输
    location /socket.io/ {
        proxy_pass http://poker_backend;
        
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}

