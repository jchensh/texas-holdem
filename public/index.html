<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Poker Night</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ── 认证视图 ── -->
<div id="view-auth" class="view active">
  <div class="auth-bg">
    <div class="auth-container">
      <div class="auth-logo">
        <span class="suit red">♥</span>
        <h1>Poker Night</h1>
        <span class="suit">♠</span>
      </div>

      <div class="auth-card">
        <div class="auth-tabs">
          <button class="tab-btn active" data-tab="login">登录</button>
          <button class="tab-btn" data-tab="register">注册</button>
        </div>

        <form id="form-login" class="auth-form active">
          <div class="form-group">
            <label>用户名</label>
            <input type="text" id="login-username" placeholder="输入用户名" autocomplete="username" required>
          </div>
          <div class="form-group">
            <label>密码</label>
            <input type="password" id="login-password" placeholder="输入密码" autocomplete="current-password" required>
          </div>
          <p class="form-error" id="login-error"></p>
          <button type="submit" class="btn-primary">登录</button>
        </form>

        <form id="form-register" class="auth-form">
          <div class="form-group">
            <label>用户名</label>
            <input type="text" id="reg-username" placeholder="设置用户名（3-16位）" autocomplete="username" required>
          </div>
          <div class="form-group">
            <label>密码</label>
            <input type="password" id="reg-password" placeholder="设置密码（至少6位）" autocomplete="new-password" required>
          </div>
          <div class="form-group">
            <label>确认密码</label>
            <input type="password" id="reg-confirm" placeholder="再次输入密码" autocomplete="new-password" required>
          </div>
          <p class="form-error" id="register-error"></p>
          <button type="submit" class="btn-primary">注册并开始</button>
        </form>
      </div>
    </div>
  </div>
</div>

<!-- ── 游戏视图 ── -->
<div id="view-game" class="view">

  <header class="game-header">
    <div class="header-logo">♠ Poker Night</div>
    <div class="header-center">
      <span id="header-username" class="header-username"></span>
      <span class="header-chips-label">筹码</span>
      <span id="header-chips" class="header-chips-value">0</span>
    </div>
    <div class="header-right">
      <button class="btn-ghost" id="btn-show-history">手牌记录</button>
      <button class="btn-ghost" id="btn-logout">退出</button>
    </div>
  </header>

  <main class="game-main">
    <div class="table-scene">

      <!-- 对手席位 -->
      <div class="player-seat opponent" id="seat-1" data-seat="1">
        <div class="seat-cards">
          <div class="card card-back sm"></div>
          <div class="card card-back sm"></div>
        </div>
        <div class="seat-body">
          <div class="seat-avatar"><span class="avatar-initials">?</span><span class="dealer-btn" hidden>D</span></div>
          <div class="seat-meta">
            <span class="seat-name">空座</span>
            <span class="seat-chips-val">–</span>
          </div>
        </div>
        <div class="seat-bet-badge" hidden><span class="bet-val">0</span></div>
        <div class="seat-action-label"></div>
      </div>

      <div class="player-seat opponent" id="seat-2" data-seat="2">
        <div class="seat-cards">
          <div class="card card-back sm"></div>
          <div class="card card-back sm"></div>
        </div>
        <div class="seat-body">
          <div class="seat-avatar"><span class="avatar-initials">?</span><span class="dealer-btn" hidden>D</span></div>
          <div class="seat-meta">
            <span class="seat-name">空座</span>
            <span class="seat-chips-val">–</span>
          </div>
        </div>
        <div class="seat-bet-badge" hidden><span class="bet-val">0</span></div>
        <div class="seat-action-label"></div>
      </div>

      <div class="player-seat opponent" id="seat-3" data-seat="3">
        <div class="seat-cards">
          <div class="card card-back sm"></div>
          <div class="card card-back sm"></div>
        </div>
        <div class="seat-body">
          <div class="seat-avatar"><span class="avatar-initials">?</span><span class="dealer-btn" hidden>D</span></div>
          <div class="seat-meta">
            <span class="seat-name">空座</span>
            <span class="seat-chips-val">–</span>
          </div>
        </div>
        <div class="seat-bet-badge" hidden><span class="bet-val">0</span></div>
        <div class="seat-action-label"></div>
      </div>

      <div class="player-seat opponent" id="seat-4" data-seat="4">
        <div class="seat-cards">
          <div class="card card-back sm"></div>
          <div class="card card-back sm"></div>
        </div>
        <div class="seat-body">
          <div class="seat-avatar"><span class="avatar-initials">?</span><span class="dealer-btn" hidden>D</span></div>
          <div class="seat-meta">
            <span class="seat-name">空座</span>
            <span class="seat-chips-val">–</span>
          </div>
        </div>
        <div class="seat-bet-badge" hidden><span class="bet-val">0</span></div>
        <div class="seat-action-label"></div>
      </div>

      <div class="player-seat opponent" id="seat-5" data-seat="5">
        <div class="seat-cards">
          <div class="card card-back sm"></div>
          <div class="card card-back sm"></div>
        </div>
        <div class="seat-body">
          <div class="seat-avatar"><span class="avatar-initials">?</span><span class="dealer-btn" hidden>D</span></div>
          <div class="seat-meta">
            <span class="seat-name">空座</span>
            <span class="seat-chips-val">–</span>
          </div>
        </div>
        <div class="seat-bet-badge" hidden><span class="bet-val">0</span></div>
        <div class="seat-action-label"></div>
      </div>

      <!-- 椭圆牌桌 -->
      <div class="poker-table">
        <div class="community-area">
          <div class="community-cards" id="community-cards">
            <div class="card card-placeholder" id="comm-0"></div>
            <div class="card card-placeholder" id="comm-1"></div>
            <div class="card card-placeholder" id="comm-2"></div>
            <div class="card card-placeholder" id="comm-3"></div>
            <div class="card card-placeholder" id="comm-4"></div>
          </div>
          <div class="pot-row">
            <span class="pot-label">奖池</span>
            <span class="pot-amount" id="pot-amount">0</span>
          </div>
        </div>
        <div class="game-status-text" id="game-status">等待玩家加入…</div>
      </div>

      <!-- 英雄区（本人） -->
      <div class="hero-zone" id="seat-0">
        <!-- 最佳牌型实时提示 -->
        <div class="hand-type-badge" id="hand-type-badge" hidden>
          <span class="badge-dot"></span>
          <span class="badge-text">当前牌型：<strong id="hand-type-name">高牌</strong></span>
        </div>

        <div class="hero-hole-cards" id="hole-cards">
          <div class="card card-placeholder" id="hole-0"></div>
          <div class="card card-placeholder" id="hole-1"></div>
        </div>

        <div class="hero-info">
          <div class="seat-avatar lg">
            <span class="avatar-initials" id="hero-initials">?</span>
            <span class="dealer-btn" id="hero-dealer" hidden>D</span>
          </div>
          <div class="seat-meta">
            <span class="seat-name" id="hero-name">–</span>
            <span class="seat-chips-val">筹码: <strong id="hero-chips">0</strong></span>
          </div>
          <div class="seat-bet-badge" id="hero-bet-badge" hidden>
            已注 <span class="bet-val" id="hero-bet">0</span>
          </div>
          <div class="seat-action-label" id="hero-action-label"></div>
        </div>

        <!-- 操作面板 -->
        <div class="action-panel" id="action-panel" hidden>
          <div class="timer-track"><div class="timer-bar" id="timer-bar"></div></div>
          <div class="action-buttons">
            <button class="btn-action btn-fold" id="btn-fold">弃牌</button>
            <button class="btn-action btn-check" id="btn-check" hidden>过牌</button>
            <button class="btn-action btn-call" id="btn-call" hidden>
              跟注&nbsp;<span id="call-amount">0</span>
            </button>
            <div class="raise-wrap">
              <div class="raise-slider-row">
                <span id="raise-min-label">0</span>
                <input type="range" id="raise-slider" min="0" max="1000" value="0">
                <span id="raise-max-label">0</span>
              </div>
              <button class="btn-action btn-raise" id="btn-raise">
                加注&nbsp;<span id="raise-display">0</span>
              </button>
            </div>
          </div>
        </div>
      </div>

      <!-- 屏幕正中央结算大弹窗 -->
      <div id="settlement-overlay" class="settlement-overlay">
        <div id="settlement-box" class="settlement-box">
          <div class="settlement-glow"></div>
          <div class="settlement-icon" id="settlement-icon">🏆</div>
          <h2 id="settlement-title">牌局结算</h2>
          <div id="settlement-player-profit" class="settlement-player-profit">0 筹码</div>
          <div id="settlement-detail" class="settlement-detail">高牌</div>
          <div class="settlement-sub-details" id="settlement-sub-details"></div>
          <div class="settlement-countdown-bar">
            <div class="settlement-countdown-progress" id="settlement-countdown-progress"></div>
          </div>
        </div>
      </div>

    </div><!-- .table-scene -->
  </main>

  <!-- 大厅等候蒙层（可关闭） -->
  <div class="overlay" id="lobby-overlay">
    <div class="lobby-card">
      <button class="lobby-close" id="lobby-close" type="button" aria-label="关闭">×</button>
      <div class="lobby-suits">♠ ♥ ♦ ♣</div>
      <h2>等待开局</h2>
      <p class="lobby-count">已入座 <span id="lobby-count">1</span> / 6 名玩家</p>
      <div class="lobby-player-list" id="lobby-players"></div>
      <p class="lobby-hint">至少需要 2 名玩家才能开始</p>
      <button class="btn-ghost lobby-dismiss" id="lobby-dismiss" type="button">先看看牌桌</button>
    </div>
  </div>

  <!-- 左下角等待角标（蒙层关闭后显示，点击重开蒙层） -->
  <button class="waiting-indicator" id="waiting-indicator" type="button" hidden>
    <span class="waiting-dot"></span>
    <span class="waiting-text">等待其他玩家</span>
    <span class="waiting-count" id="waiting-count">1 / 6</span>
  </button>

</div><!-- #view-game -->

<!-- ── 手牌历史视图 ── -->
<div id="view-history" class="view">
  <header class="history-header">
    <button class="btn-ghost" id="btn-back-game">← 返回游戏</button>
    <h2>手牌记录</h2>
    <span class="history-total">共 <strong id="history-count">0</strong> 手</span>
  </header>

  <div class="history-body">
    <div class="history-summary">
      <div class="summary-stat">
        <span class="stat-label">总盈亏</span>
        <span class="stat-value" id="history-pnl">+0</span>
      </div>
      <div class="summary-stat">
        <span class="stat-label">胜率</span>
        <span class="stat-value" id="history-winrate">0%</span>
      </div>
      <div class="summary-stat">
        <span class="stat-label">当前筹码</span>
        <span class="stat-value" id="history-chips">0</span>
      </div>
    </div>

    <div class="history-list" id="history-list">
      <div class="history-empty">暂无手牌记录</div>
    </div>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="js/socket.js"></script>
<script src="js/app.js"></script>
</body>
</html>
